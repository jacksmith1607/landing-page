<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jacklsmith.co.uk</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7f8fa;
            font-family: system-ui, sans-serif;
            color: #333;
        }

        .card {
            text-align: center;
            background: #fff;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 600px;
        }

        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
            color: #f38020;
            font-weight: 700;
        }

        .logo span {
            margin-top: 0.5rem;
            font-size: 1.2rem;
        }

        h1 {
            margin: 0 0 1rem;
            font-size: 2.2rem;
        }

        p {
            margin: 0.5rem 0;
            color: #666;
            line-height: 1.6;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #999;
        }

        svg {
            width: 64px;
            height: 64px;
        }
    </style>
</head>
<body>
    <div class="card">

        <div class="logo">
            <!-- Simple cloud icon (original, not Cloudflare logo) -->
            <svg viewBox="0 0 24 24" fill="none" stroke="#f38020" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 17.5a4.5 4.5 0 0 0-1.5-8.7A6 6 0 0 0 6.5 9.5 4 4 0 0 0 6 17.5h14z"/>
            </svg>
            <span>Cloud Services</span>
        </div>

        <h1>jacklsmith.co.uk</h1>

        <p>This domain has been registered and is currently parked.</p>

        <p>A website may be published here in the future.</p>

        <div class="footer">
            Powered by Cloudflare DNS & Security
        </div>
    </div>
</body>
</html>
